name: Temporary AI Mode fetch

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  fetch:
    if: github.head_ref == 'tmp/aimode-run-2o1xkgdideoopkjq7'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install browser tools
        run: |
          npm install --no-save playwright turndown turndown-plugin-gfm
          npx playwright install --with-deps chromium

      - name: Capture shared response
        env:
          SHARE_URL: https://share.google/aimode/2O1xKgdiDeOOpKJq7
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import { chromium } from 'playwright';
          import TurndownService from 'turndown';
          import { gfm } from 'turndown-plugin-gfm';

          const shareUrl = process.env.SHARE_URL;
          const browser = await chromium.launch({
            headless: true,
            args: ['--no-sandbox', '--disable-dev-shm-usage', '--disable-blink-features=AutomationControlled']
          });
          const context = await browser.newContext({
            locale: 'en-GB',
            viewport: { width: 1440, height: 1200 },
            userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36'
          });
          const page = await context.newPage();
          page.setDefaultTimeout(15000);

          const errors = [];
          page.on('console', msg => {
            if (msg.type() === 'error') errors.push(`console: ${msg.text()}`);
          });
          page.on('pageerror', err => errors.push(`pageerror: ${err.message}`));
          page.on('requestfailed', req => errors.push(`requestfailed: ${req.url()} :: ${req.failure()?.errorText || ''}`));

          try {
            await page.goto(shareUrl, { waitUntil: 'domcontentloaded', timeout: 120000 });
          } catch (err) {
            errors.push(`goto: ${err.message}`);
          }

          for (let pass = 0; pass < 4; pass++) {
            await page.waitForTimeout(3000);
            const buttonPatterns = [
              /^accept all$/i, /^reject all$/i, /^i agree$/i, /^continue$/i,
              /^alle akzeptieren$/i, /^alles ablehnen$/i, /^zustimmen$/i,
              /^accepter tout$/i, /^tout refuser$/i
            ];
            const buttons = page.getByRole('button');
            const count = await buttons.count().catch(() => 0);
            let clicked = false;
            for (let i = 0; i < count; i++) {
              const b = buttons.nth(i);
              const txt = (await b.innerText().catch(() => '')).trim();
              if (buttonPatterns.some(re => re.test(txt))) {
                await b.click({ timeout: 5000 }).catch(() => {});
                clicked = true;
                await page.waitForTimeout(3000);
                break;
              }
            }
            if (!clicked) break;
          }

          let bestText = '';
          let bestHtml = '';
          let bestUrl = page.url();
          const deadline = Date.now() + 90000;
          while (Date.now() < deadline) {
            await page.waitForTimeout(3000);
            const snap = await page.evaluate(() => ({
              text: document.body?.innerText || '',
              html: document.body?.innerHTML || '',
              title: document.title || '',
              url: location.href
            })).catch(() => ({ text: '', html: '', title: '', url: page.url() }));
            if (snap.text.length > bestText.length) {
              bestText = snap.text;
              bestHtml = snap.html;
              bestUrl = snap.url;
            }
            const blocked = /unusual traffic|not a robot|captcha|before you continue/i.test(snap.text);
            const looksComplete = snap.text.length > 1200 && !blocked;
            if (looksComplete) {
              await page.waitForTimeout(6000);
              const finalSnap = await page.evaluate(() => ({
                text: document.body?.innerText || '',
                html: document.body?.innerHTML || '',
                title: document.title || '',
                url: location.href
              }));
              if (finalSnap.text.length >= bestText.length) {
                bestText = finalSnap.text;
                bestHtml = finalSnap.html;
                bestUrl = finalSnap.url;
              }
              break;
            }
          }

          await page.screenshot({ path: 'page.png', fullPage: true }).catch(err => errors.push(`screenshot: ${err.message}`));
          fs.writeFileSync('page.html', bestHtml || '<!-- empty -->', 'utf8');
          fs.writeFileSync('page.txt', bestText || '', 'utf8');
          fs.writeFileSync('diagnostics.txt', [
            `Source: ${shareUrl}`,
            `Final URL: ${bestUrl}`,
            `Text length: ${bestText.length}`,
            '',
            ...errors.slice(0, 300)
          ].join('\n'), 'utf8');

          const turndown = new TurndownService({
            headingStyle: 'atx',
            bulletListMarker: '-',
            codeBlockStyle: 'fenced',
            emDelimiter: '*'
          });
          turndown.use(gfm);
          turndown.remove(['script', 'style', 'noscript', 'svg']);
          let markdown = '';
          try {
            markdown = turndown.turndown(bestHtml || '');
          } catch (err) {
            errors.push(`turndown: ${err.message}`);
          }
          if (!markdown.trim()) markdown = bestText;
          const header = `# Google AI Mode shared response\n\nSource: ${shareUrl}\n\n---\n\n`;
          fs.writeFileSync('response.md', header + markdown.trim() + '\n', 'utf8');

          console.log(JSON.stringify({ finalUrl: bestUrl, textLength: bestText.length, errors: errors.length }));
          await browser.close();
          NODE

      - name: Upload capture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aimode-response
          path: |
            response.md
            page.txt
            page.html
            page.png
            diagnostics.txt
          if-no-files-found: error
          retention-days: 1
